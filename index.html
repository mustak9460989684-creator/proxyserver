<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watch Full Video</title>
    <style>
        body { background-color: #1a1a1a; color: white; font-family: 'Arial', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        h2 { text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; }
        
        /* Video Container */
        .video-box { width: 100%; max-width: 800px; border-radius: 15px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        video { width: 100%; display: block; }

        /* Glowing Card Layout */
        .install-card {
            margin-top: 30px;
            width: 100%;
            max-width: 450px;
            background: #111;
            border-radius: 20px;
            padding: 20px;
            position: relative;
            text-align: left;
            border: 2px solid transparent;
            /* Rainbow Border Effect */
            background-image: linear-gradient(#111, #111), linear-gradient(to right, red, orange, yellow, green, cyan, blue, violet);
            background-origin: border-box;
            background-clip: content-box, border-box;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
        }

        .app-info { display: flex; align-items: center; margin-bottom: 15px; }
        .app-icon { width: 60px; height: 60px; border-radius: 12px; margin-right: 15px; }
        
        .badges { margin-bottom: 5px; }
        .badge { font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: bold; margin-right: 5px; }
        .badge-red { background: #ff4757; }
        .badge-blue { background: #3742fa; }

        .app-name { font-size: 18px; font-weight: bold; margin: 0; }
        .app-desc { font-size: 12px; color: #aaa; margin: 5px 0; }
        .stars { color: #f1c40f; font-size: 14px; }

        /* The Install Button */
        .install-btn {
            display: block;
            width: 100%;
            background: #00ca62; /* Green color */
            color: white;
            text-align: center;
            padding: 12px 0;
            border-radius: 25px;
            text-decoration: none;
            font-weight: bold;
            font-size: 18px;
            transition: 0.3s;
        }
        .install-btn:hover { background: #00af55; transform: scale(1.02); }
    </style>
</head>
<body>

    <h2>Watch Full Video</h2>

    <div class="video-box">
        <video controls poster="https://via.placeholder.com/800x450/000/fff?text=Click+to+Play">
            <source src= https://www.image2url.com/r2/default/videos/1778755972088-df2b19ad-be9a-4f14-81b5-28ae0bd05ba3.mp4 type="video/mp4">
        </video>
    </div>

    <div class="install-card">
        <div class="app-info">
            <img src="https://via.placeholder.com/60/007bff/fff?text=App" class="app-icon" alt="icon">
            <div>
                <div class="badges">
                    <span class="badge badge-red">NEW</span>
                    <span class="badge badge-blue">PREMIUM</span>
                </div>
                <p class="app-name">PROXY SERVER</p>
                <p class="app-desc">FREE FIRE PROXY SERVER UNLIMITED ACCESS</p>
                <div class="stars">★★★★★</div>
            </div>
        </div>
        
        <a href="APNA_INSTALL_LINK" class="install-btn">⬇ Install</a>
    </div>

</body>
</html>
