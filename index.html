<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watch Full Video</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: #222222; 
            color: white; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px;
        }

        h2 { 
            font-size: 18px; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            margin: 20px 0;
            font-weight: bold;
        }

        /* Video Container */
        .video-box { 
            width: 100%; 
            max-width: 850px; 
            background: #000;
            border-radius: 15px; 
            overflow: hidden; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            border: 1px solid #333;
        }
        video { width: 100%; display: block; outline: none; }

        /* Rainbow Glowing Card */
        .install-card {
            margin-top: 40px;
            width: 100%;
            max-width: 480px;
            background: #111;
            border-radius: 25px;
            padding: 20px;
            position: relative;
            /* Rainbow Border Trick */
            border: 2px solid transparent;
            background-image: linear-gradient(#111, #111), linear-gradient(90deg, #ff0000, #ff7300, #fffb00, #48ff00, #00ffd5, #002bff, #7a00ff, #ff00c8, #ff0000);
            background-origin: border-box;
            background-clip: content-box, border-box;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .app-header { display: flex; align-items: center; margin-bottom: 15px; }
        
        .app-icon { 
            width: 65px; 
            height: 65px; 
            border-radius: 15px; 
            margin-right: 15px; 
            object-fit: cover;
            background: #333;
        }

        .badges { margin-bottom: 5px; display: flex; gap: 5px; }
        .badge { 
            font-size: 10px; 
            padding: 2px 10px; 
            border-radius: 20px; 
            font-weight: bold; 
            text-transform: uppercase;
        }
        .badge-red { background: #ff3b30; color: white; }
        .badge-blue { background: #5856d6; color: white; }

        .app-name { font-size: 20px; font-weight: bold; margin: 0; color: #fff; }
        .app-desc { font-size: 11px; color: #888; margin: 4px 0; text-transform: uppercase; }
        .stars { color: #ffcc00; font-size: 14px; letter-spacing: 2px; }

        /* Green Install Button */
        .install-btn {
            display: block;
            width: 100%;
            background: #00c853; /* Perfect Green */
            color: white;
            text-align: center;
            padding: 14px 0;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
            font-size: 20px;
            margin-top: 10px;
            transition: transform 0.2s;
        }
        .install-btn:hover { transform: scale(1.02); background: #00e676; }
    </style>
</head>
<body>

    <h2>Watch Full Video</h2>

    <div class="video-box">
        <video id="v-player" autoplay muted playsinline controls>
            <source src= https://www.image2url.com/r2/default/videos/1778817759040-59e297da-8e7d-4b04-b383-cd7e2bc0be98.mp4
            Your browser does not support video.
        </video>
    </div>

    <div class="install-card">
        <div class="app-header">
       <img src="https://i.ibb.co/N2SsHrTK/Picsart-26-02-14-13-00-10-094-scaled.png" alt="AI Proxy Server" style="width: 80px; height: 80px; border-radius: 15px; object-fit: cover;">
            <div>
                <div class="badges">
                    <span class="badge badge-red">New</span>
                    <span class="badge badge-blue">Premium</span>
                </div>
                <p class="app-name">FREE DIAMONDS</p>
                <p class="app-desc">Free Fire Proxy Server Unlimited Access</p>
                <div class="stars">★★★★★</div>
            </div>
        </div>
        
        <a href="https://control.kochava.com/v1/cpi/click?campaign_id=kozz75860049-9v7l5tl1cac46c7d45dec&network_id=518&site_id=xxagentidxx&device_id=device_id&click_id=jjhitjj&campaignid=xxprogidxx" class="install-btn">⬇ Install</a>
    </div>

    <script>
        // Jaise hi user screen par kahin bhi touch kare, video ki awaaz on ho jaye
        document.body.addEventListener('click', function() {
            const v = document.getElementById('v-player');
            if (v.muted) {
                v.muted = false;
            }
        }, {once: true});
    </script>

</body>
</html>
